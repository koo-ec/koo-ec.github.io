site_name: Koorosh Aslansefat
site_description: Academic website of Dr Koorosh Aslansefat, Assistant Professor in Computer Science at the University of Hull.
site_url: https://koo-ec.github.io/
site_author: Dr Koorosh Aslansefat
repo_url: https://github.com/koo-ec/koo-ec.github.io
repo_name: koo-ec/koo-ec.github.io

docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  custom_dir: overrides
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - navigation.expand
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Research: research.md
  - Funding: funding.md
  - Projects:
      - Overview: projects/index.md
      - AKT TRUST-LLM: projects/akt-trust-llm.md
      - KTP Connexin: projects/ktp-connexin.md
      - iCASE QinetiQ: projects/icase-qinetiq.md
      - iCASE QinetiQ via Newcastle: projects/icase-qinetiq-newcastle.md
      - Digital Twin Offshore Wind: projects/digital-twin-offshore-wind.md
      - Transforming Urban Health: projects/transforming-urban-health.md
      - Vital Knowledge Exchange: projects/vital-knowledge-exchange.md
      - Alan Turing Enrichment Award: projects/alan-turing-enrichment.md
  - Publications: publications.md
  - Supervision: supervision.md
  - Teaching: teaching.md
  - Service: service.md
  - Talks: talks.md
  - Contact: contact.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra_css:
  - assets/stylesheets/academic.css

extra_javascript:
  - assets/javascripts/ai-links.js

extra:
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:k.aslansefat@hull.ac.uk
      name: Email
    - icon: fontawesome/brands/github
      link: https://github.com/koo-ec
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/koorosh-aslansefat
      name: LinkedIn
    - icon: fontawesome/solid/graduation-cap
      link: https://scholar.google.com/citations?user=YBa4Tl8AAAAJ
      name: Google Scholar

exclude_docs: |
  README.md

copyright: Copyright &copy; Koorosh Aslansefat
